<!DOCTYPE html> 
<html>

<head>
<meta charset="UTF-8">

<!-- Open Graph (clean / minimal) -->
<meta property="og:title" content="‎" />
<meta property="og:description" content="‎" />
<meta property="og:image" content="https://lanyard-profile-readme.vercel.app/api/840199281998299206" />
<meta property="og:type" content="website" />

<title>Nothing to see here..</title>

<link rel="icon" type="image/png" href="../webicon.png">
<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

<style>
.empty-text {
  font-family: 'Playpen Sans', cursive;
  font-size: 1.4rem;
  opacity: 0.5;
  text-align: center;
  letter-spacing: 0.05em;
}
</style>

</head>

<body>

<div class="background"></div>

<div class="card setup-fade donate-wrap" style="justify-content:center; min-height:200px;">

  <div class="empty-text">
    Nothing to see here..
  </div>

  <a class="donate-back" href="../index.html" style="margin-top:20px;">← Homepage</a>

</div>

<script>
document.body.classList.add("fade-in");
document.querySelector(".card").classList.add("visible");

document.querySelectorAll("a").forEach(link => {
  if (link.hostname === window.location.hostname) {
    link.addEventListener("click", function(e) {
      e.preventDefault();
      const url = this.href;
      document.body.style.opacity = 0;
      setTimeout(() => { window.location.href = url; }, 300);
    });
  }
});
</script>

</body>
</html>
