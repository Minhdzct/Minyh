<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>@Minyh</title>

<link rel="icon" type="image/png" href="webicon.png">

<link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="enter-screen">
  <p>click to enter...</p>
</div>

<div class="background"></div>

<div class="card">

<div class="clock-box">
<span id="time"></span>
<span id="date"></span>
<span class="timezone">(GMT+7)</span>
</div>

<div class="profile-row">
<img class="avatar" src="avatar.png">
<h1 class="name">Minyh</h1>
</div>

<p class="bio">Just a plain human, nothing to see here~</p>
<p class="bio">Maybe add my Discord?</p>

<div class="discord-card">
<img id="discord-status" src="https://lanyard.cnrad.dev/api/840199281998299206?hideBadges=true&bg=1a1a1a50">
</div>

<div class="socials">

<a href="https://www.youtube.com/@rifikaru" target="_blank">
<img src="icons/youtube.svg" alt="YouTube">
</a>

<a href="https://discord.gg/kdNFAmyzwu" target="_blank">
<img src="icons/discord.svg" alt="Discord">
</a>

<a href="https://guns.lol/thynguyenhong" target="_blank">
<img src="heart.png" alt="Heart">
</a>

<a href="https://steamcommunity.com/id/rifikaru/" target="_blank">
<img src="icons/steam.svg" alt="Steam">
</a>

<a href="https://open.spotify.com/user/317klfocuvdjnjb7io7qm3cwbfh4" target="_blank">
<img src="icons/spotify.svg" alt="Spotify">
</a>

</div>

<!-- MUSIC PLAYER -->

<div class="music-player">

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<input type="range" id="volume" min="0" max="0.3" step="0.01" value="0.15">

</div>

</div> <!-- END CARD -->


<!-- CONFETTI BUTTON (OUTSIDE CARD) -->

<img src="button.png" id="confettiBtn">


<script src="scripts/clock.js"></script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

const music = document.getElementById("music");
const volume = document.getElementById("volume");
const enter = document.getElementById("enter-screen");
const btn = document.getElementById("confettiBtn");

music.volume = volume.value;

volume.addEventListener("input", () => {
  music.volume = volume.value;
});

enter.addEventListener("click", () => {
  music.play();
  enter.style.opacity = "0";

  setTimeout(() => {
    enter.style.display = "none";
    btn.style.display = "block";   // ADD THIS
  }, 500);
});

/* CONFETTI BUTTON */

btn.addEventListener("click", () => {

  btn.src = "doro.png";

  btn.classList.add("shake");
  setTimeout(() => btn.classList.remove("shake"), 400);

  confetti({
    particleCount:120,
    spread:70,
    origin:{x:0}
  });

  confetti({
    particleCount:120,
    spread:70,
    origin:{x:1}
  });

  setTimeout(() => {
    btn.src = "button.png";
  }, 800);

});

</script>
<script>
setInterval(() => {
  const img = document.getElementById("discord-status");
  img.src = "https://lanyard.cnrad.dev/api/840199281998299206?hideBadges=true&bg=1a1a1a50&t=" + Date.now();
}, 10000);
</script>
<script>

document.body.classList.add("fade-in");

document.querySelectorAll("a").forEach(link => {
  if(link.hostname === window.location.hostname){
    link.addEventListener("click", function(e){
      e.preventDefault();
      const url = this.href;

      document.body.style.opacity = 0;

      setTimeout(()=>{
        window.location.href = url;
      },300);
    });
  }
});

</script>
</body>
</html>
